<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New message via Pawsitive</title>
</head>
<body style="margin:0;padding:0;background:#ffffff;font-family:Arial,sans-serif;color:#111111;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#ffffff;padding:40px 20px;">
    <tr>
      <td align="center">
        <table width="560" cellpadding="0" cellspacing="0" style="max-width:560px;width:100%;">

          <!-- Header -->
          <tr>
            <td style="padding-bottom:24px;border-bottom:1px solid #e0e0e0;">
              <span style="font-size:1rem;font-weight:700;color:#111111;">🐾 pawsitive</span>
              <span style="font-size:0.85rem;color:#888888;margin-left:8px;">· new message</span>
            </td>
          </tr>

          <!-- Meta -->
          <tr>
            <td style="padding:24px 0 0;">
              <table cellpadding="0" cellspacing="0">
                <tr>
                  <td style="font-size:0.8rem;color:#888888;padding-bottom:6px;width:80px;">From</td>
                  <td style="font-size:0.9rem;color:#111111;padding-bottom:6px;">{{from_name}}</td>
                </tr>
                <tr>
                  <td style="font-size:0.8rem;color:#888888;padding-bottom:6px;">Email</td>
                  <td style="font-size:0.9rem;padding-bottom:6px;">
                    <a href="mailto:{{from_email}}" style="color:#111111;text-decoration:underline;">{{from_email}}</a>
                  </td>
                </tr>
                <tr>
                  <td style="font-size:0.8rem;color:#888888;">Topic</td>
                  <td style="font-size:0.9rem;color:#111111;">{{topic}}</td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Divider -->
          <tr><td style="padding:20px 0;"><hr style="border:none;border-top:1px solid #e0e0e0;"></td></tr>

          <!-- Message -->
          <tr>
            <td style="font-size:0.9rem;color:#111111;line-height:1.7;white-space:pre-wrap;">{{message}}</td>
          </tr>

          <!-- Divider -->
          <tr><td style="padding:24px 0 16px;"><hr style="border:none;border-top:1px solid #e0e0e0;"></td></tr>

          <!-- Reply link -->
          <tr>
            <td style="padding-bottom:32px;">
              <a href="mailto:{{from_email}}?subject=Re: {{topic}}" style="font-size:0.85rem;color:#111111;text-decoration:underline;">Reply to {{from_name}}</a>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="font-size:0.75rem;color:#aaaaaa;">
              Sent via the Pawsitive contact form · Ashoka University
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
