<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New message via Pawsitive</title>
</head>
<body style="margin:0;padding:0;background:#fdf8f0;font-family:'Helvetica Neue',Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#fdf8f0;padding:40px 20px;">
    <tr>
      <td align="center">
        <table width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;background:#fffdf7;border:2px solid #c9a87c;border-radius:18px;overflow:hidden;box-shadow:5px 5px 0 rgba(45,32,19,0.12);">

          <!-- Header -->
          <tr>
            <td style="background:linear-gradient(135deg,#ffe8d0,#ffd8b0);padding:28px 32px;border-bottom:2px solid #c9a87c;">
              <table width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td>
                    <div style="font-size:2rem;font-weight:700;color:#e8654a;letter-spacing:1px;font-family:Georgia,serif;">
                      🐾 pawsitive
                    </div>
                    <div style="font-size:0.85rem;color:#6b4f2e;margin-top:4px;">
                      Ashoka University · Animal Welfare Club
                    </div>
                  </td>
                  <td align="right">
                    <span style="background:#e8654a;color:#fff;font-size:0.78rem;font-weight:700;padding:4px 12px;border-radius:20px;letter-spacing:0.05em;white-space:nowrap;">
                      📬 NEW MESSAGE
                    </span>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Topic badge -->
          <tr>
            <td style="padding:24px 32px 0;">
              <div style="display:inline-block;background:#f5efe3;border:2px solid #c9a87c;border-radius:20px;padding:5px 14px;font-size:0.82rem;color:#6b4f2e;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;">
                {{topic}}
              </div>
            </td>
          </tr>

          <!-- Sender info -->
          <tr>
            <td style="padding:20px 32px 0;">
              <table width="100%" cellpadding="0" cellspacing="0" style="background:#f5efe3;border:2px solid #c9a87c;border-radius:14px;overflow:hidden;">
                <tr>
                  <td style="padding:16px 20px;border-bottom:1px solid #c9a87c;">
                    <span style="font-size:0.78rem;color:#6b4f2e;text-transform:uppercase;letter-spacing:0.06em;font-weight:600;">From</span><br>
                    <span style="font-size:1rem;color:#2d2013;font-weight:600;margin-top:3px;display:block;">{{from_name}}</span>
                  </td>
                  <td style="padding:16px 20px;border-bottom:1px solid #c9a87c;">
                    <span style="font-size:0.78rem;color:#6b4f2e;text-transform:uppercase;letter-spacing:0.06em;font-weight:600;">Reply to</span><br>
                    <a href="mailto:{{from_email}}" style="font-size:1rem;color:#e8654a;font-weight:600;text-decoration:none;margin-top:3px;display:block;">{{from_email}}</a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Message body -->
          <tr>
            <td style="padding:24px 32px;">
              <div style="font-size:0.82rem;color:#6b4f2e;text-transform:uppercase;letter-spacing:0.06em;font-weight:600;margin-bottom:10px;">Message</div>
              <div style="background:#fff;border:2px solid #c9a87c;border-radius:14px;padding:20px 22px;font-size:0.97rem;color:#2d2013;line-height:1.75;white-space:pre-wrap;">{{message}}</div>
            </td>
          </tr>

          <!-- Reply CTA -->
          <tr>
            <td style="padding:0 32px 28px;" align="center">
              <a href="mailto:{{from_email}}?subject=Re: {{topic}}" style="display:inline-block;background:#e8654a;color:#fff;font-size:1rem;font-weight:700;padding:12px 28px;border-radius:12px;text-decoration:none;border:2.5px solid #2d2013;box-shadow:3px 3px 0 #2d2013;">
                Reply to {{from_name}} →
              </a>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background:#f5efe3;border-top:2px dashed #c9a87c;padding:16px 32px;text-align:center;">
              <div style="font-size:0.8rem;color:#6b4f2e;line-height:1.6;">
                This email was sent via the contact form on the Pawsitive website.<br>
                made with <span style="color:#e8654a;">❤️</span> · pawsitive · ashoka university · 🐾
              </div>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
