<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pawsitive | Ashoka University</title>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Klee+One:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/main.css">
  <link rel="icon" type="image/jpeg" href="/public/logo/Paws Logo.jpg">
</head>
<body>

<nav>
  <div class="logo" onclick="showPage('home')">
    <img src="/public/logo/Paws Logo.jpg" alt="Pawsitive Logo" style="height:32px;vertical-align:middle;margin-right:8px;">
    pawsitive
  </div>
  <div class="nav-links" id="nav-links">
    <button class="nav-link" id="nav-home"        onclick="showPage('home')">home</button>
    <button class="nav-link" id="nav-about"       onclick="showPage('about')">about us</button>
    <button class="nav-link" id="nav-dogs"        onclick="showPage('dogs')">our dogs</button>
    <button class="nav-link" id="nav-memoriam"    onclick="showPage('memoriam')">in memoriam</button>
    <button class="nav-link" id="nav-departments" onclick="showPage('departments')">departments</button>
    <button class="nav-link" id="nav-team"        onclick="showPage('team')">meet the team</button>
    <button class="nav-link" id="nav-gallery"     onclick="showPage('gallery')">gallery</button>
    <button class="nav-link" id="nav-contact"     onclick="showPage('contact')">contact</button>
    <button class="nav-donate" id="nav-donate"    onclick="showPage('donate')">❤️ donate</button>
  </div>
  <div class="nav-right">
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark/light mode">
      <span>☀️</span><span>🌙</span>
    </button>
    <button class="hamburger" id="hamburger" onclick="toggleNav()" aria-label="Toggle menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>

<!-- Page containers — content loaded dynamically from pages/*.html -->
<div class="page" id="page-home"></div>
<div class="page" id="page-about"></div>
<div class="page" id="page-dogs"></div>
<div class="page" id="page-memoriam"></div>
<div class="page" id="page-departments"></div>
<div class="page" id="page-dept-detail"></div>
<div class="page" id="page-team"></div>
<div class="page" id="page-gallery"></div>
<div class="page" id="page-donate"></div>
<div class="page" id="page-contact"></div>

<!-- Image lightbox -->
<div class="img-lightbox" id="imgLightbox" onclick="closeLightbox(event)">
  <button class="lb-nav lb-prev" onclick="event.stopPropagation();lightboxNav(-1)">&#8249;</button>
  <div class="lb-inner" onclick="event.stopPropagation()">
    <img id="lbImg" src="" alt="Pawsitive photo">
    <div class="lb-counter" id="lbCounter"></div>
  </div>
  <button class="lb-nav lb-next" onclick="event.stopPropagation();lightboxNav(1)">&#8250;</button>
  <button class="lb-close" onclick="closeLightbox({closeForced:true})">✕</button>
</div>

<!-- Video modal -->
<div class="modal-bg" id="videoModal" onclick="closeVideoModal(event)">
  <div class="video-modal-box" onclick="event.stopPropagation()">
    <video id="modalVideo" controls playsinline></video>
    <button class="modal-close" onclick="closeVideoModal({closeForced:true})">close ✕</button>
  </div>
</div>

<!-- JS modules -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script src="js/gallery.js"></script>
<script src="js/donate.js"></script>
<script src="js/contact.js"></script>
<script src="js/dogs.js"></script>
<script src="js/memoriam.js"></script>
<script src="js/app.js"></script>

</body>
</html>
